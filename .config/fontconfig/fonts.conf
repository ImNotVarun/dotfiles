<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Reject Cascadia Code entirely from font matching -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family">
          <string>Cascadia Code</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Cascadia Mono</string>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>
</fontconfig>